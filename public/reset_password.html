<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDF1F7;
    --bg-grid: #E1E7F0;
    --card: #FFFFFF;
    --ink: #12192B;
    --muted: #5B6B84;
    --line: #DCE3EE;
    --accent: #0E7C7B;
    --accent-ink: #08403F;
    --danger: #C4432B;
    --success: #1F7A4D;
    --gauge-empty: #E3E8F0;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background:
      linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0/100% 44px,
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0/44px 100%,
      var(--bg);
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: min(440px, 100%);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 36px 32px;
    box-shadow: 0 24px 60px -20px rgba(18, 25, 43, 0.25);
  }

  .badge {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .badge svg { width: 22px; height: 22px; }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
    color: var(--ink);
  }

  .sub {
    color: var(--muted);
    font-size: 0.94rem;
    line-height: 1.55;
    margin: 0 0 28px;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap { position: relative; }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 13px 46px 13px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.98rem;
    color: var(--ink);
    background: #FBFCFE;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input::placeholder { color: #A8B3C4; }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(14, 124, 123, 0.13);
  }

  input.field-error {
    border-color: var(--danger);
  }
  input.field-error:focus {
    box-shadow: 0 0 0 4px rgba(196, 67, 43, 0.13);
  }

  .toggle-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    display: flex;
    border-radius: 6px;
  }
  .toggle-btn:hover { color: var(--ink); background: #F0F3F8; }
  .toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .toggle-btn svg { width: 18px; height: 18px; }

  /* Signature element: security gauge */
  .gauge-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    min-height: 18px;
  }
  .gauge-bars {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .gauge-bars span {
    height: 4px;
    flex: 1;
    border-radius: 2px;
    background: var(--gauge-empty);
    transition: background 0.2s ease;
  }
  .gauge-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    color: var(--muted);
    white-space: nowrap;
    min-width: 56px;
    text-align: right;
  }

  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hint svg { width: 14px; height: 14px; flex-shrink: 0; }
  .hint.match-good { color: var(--success); }
  .hint.match-bad { color: var(--danger); }

  button.submit {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent-ink);
    color: #fff;
    font-weight: 600;
    font-size: 0.98rem;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  button.submit:hover { background: #062E2D; }
  button.submit:active { transform: translateY(1px); }
  button.submit:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.submit:disabled { background: #A8B3C4; cursor: not-allowed; }

  .status {
    margin-top: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
    align-items: flex-start;
    gap: 8px;
    padding: 12px 14px;
    border-radius: 10px;
  }
  .status svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
  .status.show { display: flex; }
  .status.error { background: #FBEDEA; color: var(--danger); }
  .status.success { background: #E9F5EF; color: var(--success); }

  .secondary-link {
    display: inline-block;
    margin-top: 18px;
    color: var(--accent-ink);
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .secondary-link:hover { border-bottom-color: var(--accent-ink); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2L4 5.5V11C4 16.2 7.4 21 12 22C16.6 21 20 16.2 20 11V5.5L12 2Z" stroke="#F4F1EA" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M9 12L11 14L15.5 9.5" stroke="#F4F1EA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Reset your password</h1>
    <p class="sub">Set a new password for your applicant portal account. You'll use it the next time you sign in.</p>

    <div class="field">
      <label for="newPassword">New password</label>
      <div class="input-wrap">
        <input id="newPassword" type="password" placeholder="Enter a new password" autocomplete="new-password" />
        <button type="button" class="toggle-btn" data-target="newPassword" aria-label="Show password" aria-pressed="false">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
          <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.24 4.24M9.2 5.3A10.9 10.9 0 0 1 12 5c7 0 10.5 7 10.5 7a13.6 13.6 0 0 1-3.1 3.9M6.3 6.9C3.5 8.8 1.5 12 1.5 12s3.5 7 10.5 7c1.2 0 2.3-.2 3.3-.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="gauge-row" aria-hidden="true">
        <div class="gauge-bars">
          <span data-bar="0"></span><span data-bar="1"></span><span data-bar="2"></span><span data-bar="3"></span>
        </div>
        <span class="gauge-label" id="strengthLabel">&nbsp;</span>
      </div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <div class="input-wrap">
        <input id="confirmPassword" type="password" placeholder="Re-enter your password" autocomplete="new-password" />
        <button type="button" class="toggle-btn" data-target="confirmPassword" aria-label="Show password" aria-pressed="false">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
          <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.24 4.24M9.2 5.3A10.9 10.9 0 0 1 12 5c7 0 10.5 7 10.5 7a13.6 13.6 0 0 1-3.1 3.9M6.3 6.9C3.5 8.8 1.5 12 1.5 12s3.5 7 10.5 7c1.2 0 2.3-.2 3.3-.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="hint" id="matchHint" style="visibility:hidden">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Passwords match</span>
      </div>
    </div>

    <button class="submit" id="submitBtn" onclick="submitReset()">Save new password</button>

    <div id="status" class="status">
      <svg id="statusIcon" viewBox="0 0 24 24" fill="none"></svg>
      <span id="statusText"></span>
    </div>

    <a id="loginLink" class="secondary-link" href="/index.html" style="display:none;">← Back to sign in</a>
  </div>

  <script src="/mefamdev-api.js"></script>
  <script>
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const matchHint = document.getElementById('matchHint');
    const bars = Array.from(document.querySelectorAll('[data-bar]'));
    const strengthLabel = document.getElementById('strengthLabel');
    const barColors = ['#C4432B', '#C98A2C', '#0E7C7B', '#1F7A4D'];
    const barLabels = ['Weak', 'Fair', 'Good', 'Strong'];

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-pressed', String(isPassword));
        btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        btn.querySelector('.eye-open').style.display = isPassword ? 'none' : '';
        btn.querySelector('.eye-closed').style.display = isPassword ? '' : 'none';
      });
    });

    function scorePassword(value) {
      if (!value) return 0;
      let score = 0;
      if (value.length >= 8) score++;
      if (value.length >= 12) score++;
      if (/[a-z]/.test(value) && /[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value) && /[^A-Za-z0-9]/.test(value)) score++;
      return Math.min(score, 4);
    }

    function updateGauge() {
      const value = newPassword.value;
      const score = scorePassword(value);
      bars.forEach((bar, i) => {
        bar.style.background = i < score ? barColors[Math.max(score - 1, 0)] : 'var(--gauge-empty)';
      });
      strengthLabel.textContent = value ? barLabels[Math.max(score - 1, 0)] : '\u00A0';
      newPassword.classList.remove('field-error');
      updateMatch();
    }

    function updateMatch() {
      if (!confirmPassword.value) {
        matchHint.style.visibility = 'hidden';
        confirmPassword.classList.remove('field-error');
        return;
      }
      const matches = newPassword.value === confirmPassword.value;
      matchHint.style.visibility = 'visible';
      matchHint.className = 'hint ' + (matches ? 'match-good' : 'match-bad');
      matchHint.querySelector('span').textContent = matches ? 'Passwords match' : "Passwords don't match yet";
      confirmPassword.classList.toggle('field-error', !matches);
    }

    newPassword.addEventListener('input', updateGauge);
    confirmPassword.addEventListener('input', updateMatch);

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    function showStatus(kind, message) {
      const status = document.getElementById('status');
      const icon = document.getElementById('statusIcon');
      const text = document.getElementById('statusText');
      status.className = 'status show ' + kind;
      text.textContent = message;
      icon.innerHTML = kind === 'success'
        ? '<path d="M5 12l5 5L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
        : '<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
    }

    async function submitReset() {
      const token = getToken();
      const password = newPassword.value;
      const confirm = confirmPassword.value;
      const btn = document.getElementById('submitBtn');

      if (!password || password.length < 4) {
        newPassword.classList.add('field-error');
        showStatus('error', 'Enter a password with at least 4 characters.');
        return;
      }
      if (password !== confirm) {
        confirmPassword.classList.add('field-error');
        showStatus('error', "Passwords don't match.");
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await MefamAPI.resetApplicantPassword(token, password);
        showStatus('success', res?.message || 'Your password has been reset successfully.');
        document.getElementById('loginLink').style.display = 'inline-block';
        btn.textContent = 'Saved';
        setTimeout(() => { window.location.href = '/index.html'; }, 2000);
      } catch (error) {
        showStatus('error', 'Unable to reset your password right now. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Save new password';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { width:min(420px, 92%); background:#fff; border-radius:16px; padding:24px; box-shadow:0 12px 40px rgba(0,0,0,.12); }
    h2 { margin-top:0; color:#1a2e44; }
    p { color:#475569; line-height:1.5; margin-bottom:12px; }
    label { display:block; margin-bottom:6px; font-weight:700; color:#334155; }
    .input-wrap { position:relative; margin-bottom:12px; }
    input { width:100%; padding:10px 12px; border:1px solid #d5dce5; border-radius:8px; }
    .toggle-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; border:none; color:#1a2e44; cursor:pointer; font-weight:700; }
    button { width:100%; padding:12px; border:none; border-radius:8px; background:#1a2e44; color:#fff; font-weight:700; cursor:pointer; }
    .msg { margin-top:10px; font-size:.92rem; }
    .error { color:#b3261e; }
    .success { color:#1b5e20; }
    .secondary-link { display:inline-block; margin-top:12px; color:#1a3a6e; font-weight:700; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset your password</h2>
    <p>Create a new password for your applicant portal account. Choose something secure and easy for you to remember.</p>
    <label for="newPassword">New password</label>
    <div class="input-wrap">
      <input id="newPassword" type="password" placeholder="Enter a new password" />
      <button type="button" class="toggle-btn" onclick="togglePasswordVisibility('newPassword', this)">Show</button>
    </div>
    <label for="confirmPassword">Confirm password</label>
    <div class="input-wrap">
      <input id="confirmPassword" type="password" placeholder="Re-enter your password" />
      <button type="button" class="toggle-btn" onclick="togglePasswordVisibility('confirmPassword', this)">Show</button>
    </div>
    <button onclick="submitReset()">Save new password</button>
    <div id="status" class="msg"></div>
    <a id="loginLink" class="secondary-link" href="/index.html" style="display:none;">Go back to login</a>
  </div>

  <script src="/mefamdev-api.js"></script>
  <script>
    function togglePasswordVisibility(inputId, button) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      button.textContent = isPassword ? 'Hide' : 'Show';
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    async function submitReset() {
      const token = getToken();
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const status = document.getElementById('status');
      status.className = 'msg';
      status.textContent = '';

      if (!password || password.length < 4) {
        status.className = 'msg error';
        status.textContent = 'Please enter a password with at least 4 characters.';
        return;
      }
      if (password !== confirm) {
        status.className = 'msg error';
        status.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const res = await MefamAPI.resetApplicantPassword(token, password);
        status.className = 'msg success';
        status.textContent = res?.message || 'Your password has been reset successfully.';
        document.getElementById('loginLink').style.display = 'inline-block';
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 2000);
      } catch (error) {
        status.className = 'msg error';
        status.textContent = 'Unable to reset your password right now.';
      }
    }
  </script>
</body>
</html>
